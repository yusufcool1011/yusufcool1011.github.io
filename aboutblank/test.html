<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Open Code in about:blank</title>
</head>
<body>
  <button onclick="openBlankCode()">Open about:blank Page</button>

  <script>
    function openBlankCode() {
      const htmlContent = `
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello from about:blank</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      padding: 20px;
    }
    h1 {
      color: #4a4a4a;
    }
  </style>
</head>
<body>
  <h1>This is a new tab (about:blank)</h1>
  <p>HTML + JavaScript was written from another tab.</p>
  <script>
    console.log("Hello from the new window!");
  <\/script>
</body>
</html>
      `;

      const newWin = window.open('about:blank');
      if (newWin) {
        newWin.document.open();
        newWin.document.write(htmlContent);
        newWin.document.close();
      } else {
        alert('Popup blocked. Please enable popups for this site.');
      }
    }
  </script>
</body>
</html>
