<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Open about:blank</title>
</head>
<body>
  <button onclick="openBlank()">Open Real about:blank</button>

  <script>
    function openBlank() {
      const newWindow = window.open('', '_blank'); // Use empty string, not about:blank
      if (!newWindow) {
        alert('Popup blocked. Please enable popups.');
        return;
      }

      const html = `
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>about:blank Code</title>
  <style>
    body { font-family: sans-serif; padding: 2em; background: #fefefe; }
    h1 { color: #222; }
  </style>
</head>
<body>
  <h1>This is truly about:blank</h1>
  <script>console.log('Running inside real about:blank');<\/script>
</body>
</html>`;

      newWindow.document.open();
      newWindow.document.write(html);
      newWindow.document.close();
    }
  </script>
</body>
</html>
