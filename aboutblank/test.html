<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Open Code in about:blank</title>
</head>
<body>
  <button onclick="openCode()">Open Code</button>

  <script>
    function openCode() {
      const code = `
        <!DOCTYPE html>
        <html>
        <head>
          <title>My Code</title>
          <style>
            body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
            h1 { color: #333; }
          </style>
        </head>
        <body>
          <h1>Hello from about:blank!</h1>
          <script>
            console.log('JavaScript is running!');
          <\/script>
        </body>
        </html>
      `;

      const newWindow = window.open('about:blank');
      newWindow.document.open();
      newWindow.document.write(code);
      newWindow.document.close();
    }
  </script>
</body>
</html>
